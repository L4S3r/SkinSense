# =====================================================
# Codemagic CI/CD Configuration for Meloniq Capture
# Builds iOS (.ipa / .app) and Android (.apk) packages
# =====================================================

workflows:
  ios-release:
    name: Meloniq Capture - iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Flutter dependencies
        script: |
          flutter packages pub get

      - name: Run code analysis
        script: |
          flutter analyze

      - name: Initialize CocoaPods & iOS Configuration
        script: |
          flutter build ios --config-only
          cd ios
          pod install
          cd ..

      - name: Build iOS App
        script: |
          flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        script: |
          cd build/ios/iphoneos
          if [ -d "Runner.app" ]; then
            mkdir -p Payload
            cp -r Runner.app Payload/
            zip -r MeloniqCapture-Unsigned.ipa Payload
          fi
    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/*.app

  ios-debug:
    name: Meloniq Capture - iOS Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Flutter dependencies
        script: |
          flutter packages pub get

      - name: Initialize CocoaPods & iOS Configuration
        script: |
          flutter build ios --config-only
          cd ios
          pod install
          cd ..

      - name: Build iOS Debug Application
        script: |
          flutter build ios --debug --no-codesign

      - name: Package Debug IPA
        script: |
          cd build/ios/iphoneos
          if [ -d "Runner.app" ]; then
            mkdir -p Payload
            cp -r Runner.app Payload/
            zip -r MeloniqCapture-Debug.ipa Payload
          fi
    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/iphoneos/*.app
